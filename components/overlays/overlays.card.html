<!-- @dsCard group="Components" viewport="700x320" name="Dialog, menu & tooltip" subtitle="Basic dialog, dropdown menu, plain & rich tooltips" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--md-sys-color-surface); }
  .grid { display:flex; gap:24px; align-items:flex-start; flex-wrap:wrap; }
  .panel { position:relative; }
  .lbl { font: 500 11px/16px 'Inter'; letter-spacing:.5px; text-transform:uppercase; color: var(--md-sys-color-on-surface-variant); margin:0 0 10px; }
  /* Render the dialog inline (not fixed) so it sits inside the card. */
  .inline-dialog > div { position: static !important; background: transparent !important; padding: 0 !important; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Dialog, Menu, Tooltip, Button, IconButton } = window.Material3DesignSystem_7bcfcf;
  function Demo() {
    return (
      <div className="grid">
        <div className="panel" style={{width:300}}>
          <p className="lbl">Dialog</p>
          <div className="inline-dialog">
            <Dialog icon="delete" headline="Delete file?"
              actions={<><Button variant="text">Cancel</Button><Button variant="filled">Delete</Button></>}>
              This will permanently remove the file from your library.
            </Dialog>
          </div>
        </div>
        <div className="panel">
          <p className="lbl">Menu</p>
          <Menu items={[
            {label:'Share', icon:'share'},
            {label:'Rename', icon:'edit'},
            {label:'Add to favorites', icon:'star'},
            {divider:true},
            {label:'Delete', icon:'delete'},
          ]} />
        </div>
        <div className="panel">
          <p className="lbl">Tooltips</p>
          <div style={{display:'flex',gap:16,paddingTop:24}}>
            <Tooltip label="Archive"><IconButton icon="archive" variant="tonal" /></Tooltip>
            <Tooltip rich subhead="Rich tooltip" body="More detail with an action." placement="bottom"
              actions={<Button variant="text" size="xs">Learn more</Button>}>
              <IconButton icon="help" variant="outlined" />
            </Tooltip>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
