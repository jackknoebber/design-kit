<!-- @dsCard group="Components" viewport="700x300" name="Cards, dividers & sheets" subtitle="Elevated / filled / outlined cards, divider, bottom sheet" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { margin: 0; padding: 24px; background: var(--md-sys-color-surface-dim); }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Card, Divider } = window.Material3DesignSystem_7bcfcf;
  function Demo() {
    const Body = ({v}) => (
      <div>
        <div style={{font:"500 16px/24px 'Inter'",color:'var(--md-sys-color-on-surface)'}}>{v[0].toUpperCase()+v.slice(1)} card</div>
        <div style={{font:"400 14px/20px 'Inter'",color:'var(--md-sys-color-on-surface-variant)',marginTop:4}}>Supporting text describing the card surface.</div>
      </div>
    );
    return (
      <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
        <Card variant="elevated" style={{width:200}}><Body v="elevated" /></Card>
        <Card variant="filled" style={{width:200}}><Body v="filled" /></Card>
        <Card variant="outlined" interactive style={{width:200}}><Body v="outlined" /></Card>
        <Card variant="elevated" style={{width:'100%'}}>
          <div style={{font:"500 14px/20px 'Inter'",color:'var(--md-sys-color-on-surface)'}}>List inside a card</div>
          <Divider style={{margin:'12px 0'}} />
          <div style={{font:"400 14px/20px 'Inter'",color:'var(--md-sys-color-on-surface-variant)'}}>Sections split by a divider.</div>
        </Card>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
