<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--md-sys-color-surface-dim); }
  .lbl { font: 500 11px/16px 'Inter'; letter-spacing:.5px; text-transform:uppercase; color: var(--md-sys-color-on-surface-variant); margin:14px 0 8px; }
  .surface { background: var(--md-sys-color-surface); border-radius:12px; overflow:hidden; }
  .cols { display:flex; gap:16px; align-items:flex-start; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { TopAppBar, Tabs, SearchBar, NavigationBar, NavigationRail, NavigationDrawer, Avatar } = window.Material3DesignSystem_7bcfcf;
  function Demo() {
    const [tab, setTab] = React.useState(0);
    const [nav, setNav] = React.useState(0);
    const [rail, setRail] = React.useState(1);
    const [drw, setDrw] = React.useState(0);
    return (
      <div>
        <div className="surface">
          <TopAppBar title="Inbox" actions={[{icon:'search'},{icon:'more_vert'}]} />
          <Tabs tabs={[{label:'Primary',icon:'inbox'},{label:'Social',icon:'group'},{label:'Promos',icon:'sell'}]} value={tab} onChange={setTab} />
        </div>
        <p className="lbl">Search bar</p>
        <SearchBar placeholder="Search mail" trailing={<Avatar initials="AM" size={30} />} />
        <p className="lbl">Bottom navigation bar</p>
        <div className="surface">
          <NavigationBar value={nav} onChange={setNav} items={[
            {label:'Home',icon:'home'},{label:'Mail',icon:'mail',badge:3},
            {label:'Tasks',icon:'check_circle'},{label:'Profile',icon:'person',badge:true},
          ]} />
        </div>
        <div className="cols">
          <div>
            <p className="lbl">Rail</p>
            <div className="surface" style={{height:300}}>
              <NavigationRail value={rail} onChange={setRail} items={[
                {label:'Home',icon:'home'},{label:'Search',icon:'search'},
                {label:'Saved',icon:'bookmark'},{label:'You',icon:'person'},
              ]} />
            </div>
          </div>
          <div style={{flex:1}}>
            <p className="lbl">Drawer</p>
            <div className="surface" style={{height:300}}>
              <NavigationDrawer headline="Mail" value={drw} onChange={setDrw} items={[
                {label:'Inbox',icon:'inbox',badge:'24'},
                {label:'Starred',icon:'star'},
                {label:'Sent',icon:'send'},
                {divider:true},
                {label:'Settings',icon:'settings'},
              ]} />
            </div>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
