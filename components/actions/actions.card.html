<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--md-sys-color-surface); }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
  .lbl { font: 500 11px/16px 'Inter', sans-serif; letter-spacing: .5px; text-transform: uppercase; color: var(--md-sys-color-on-surface-variant); margin: 0 0 8px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Fab } = window.Material3DesignSystem_7bcfcf;
  function Demo() {
    return (
      <div>
        <p className="lbl">Common buttons</p>
        <div className="row">
          <Button variant="filled" icon="add">Filled</Button>
          <Button variant="tonal">Tonal</Button>
          <Button variant="elevated">Elevated</Button>
          <Button variant="outlined">Outlined</Button>
          <Button variant="text">Text</Button>
        </div>
        <p className="lbl">Sizes (xs · s · m · l)</p>
        <div className="row">
          <Button size="xs">XS</Button>
          <Button size="s">Small</Button>
          <Button size="m" icon="bolt">Medium</Button>
          <Button size="l">Large</Button>
        </div>
        <p className="lbl">Icon buttons</p>
        <div className="row">
          <IconButton icon="favorite" variant="filled" selected />
          <IconButton icon="bookmark" variant="tonal" />
          <IconButton icon="settings" variant="outlined" />
          <IconButton icon="more_vert" variant="standard" />
          <IconButton icon="square" variant="filled" shape="square" />
        </div>
        <p className="lbl">Floating action buttons</p>
        <div className="row">
          <Fab icon="add" size="small" />
          <Fab icon="edit" />
          <Fab icon="navigation" color="tertiary" />
          <Fab icon="add" extended label="Compose" color="primary" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
